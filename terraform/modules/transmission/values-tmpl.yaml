# https://github.com/truecharts/public/blob/master/charts/stable/transmission/values.yaml
persistence:
  config:
    enabled: true
    type: hostPath
    hostPath: ${transmission_config}
    mountPath: "/config"
  downloads:
    enabled: true
    type: hostPath
    hostPath: "${plexdir_downloads}/complete"
    mountPath: "/downloads/complete"
    readOnly: false
  incomplete:
    enabled: true
    type: hostPath
    hostPath: "${plexdir_downloads}/incomplete"
    mountPath: "/downloads/incomplete"
    readOnly: false

workload:
  main:
    podSpec:
      containers:
        main:
          env:
            USER: ${username}
            PASS: ${password}

securityContext:
  container:
    readOnlyRootFilesystem: false
    runAsNonRoot: false

ingress:
  main:
    ingressClassName: traefik
    enabled: true
    integrations:
      homepage:
        enabled: ${homepage_enabled}
      traefik:
        enabled: true
    hosts:
      - host: ${full_path}
        paths:
          - path: /
            pathType: Prefix
    tls:
      - hosts:
          - ${full_path}
        secretName: ${tls_secret}
