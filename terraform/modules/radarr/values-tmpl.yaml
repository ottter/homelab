# https://github.com/truecharts/public/blob/master/charts/stable/radarr/values.yaml
%{ if nfs_enabled }
persistence:
  media:
    enabled: true
    type: nfs
    path: ${nfs_mount_point}
    server: ${server_ip}
    mountPath: /media
%{ endif }

workload:
  main:
    podSpec:
      containers:
        main:
          env:
            RADARR__APP__THEME: dark

metrics:
  main:
    enabled: false

ingress:
  main:
    ingressClassName: traefik
    enabled: true
    integrations:
      homepage:
        enabled: ${homepage_enabled}
      traefik:
        enabled: true
    hosts:
      - host: ${full_path}
        paths:
          - path: /
            pathType: Prefix
    tls:
      - hosts:
          - ${full_path}
        secretName: ${tls_secret}
