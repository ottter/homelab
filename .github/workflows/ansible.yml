name: Ansible Lint

on:
  push:
    branches: ["main"]
    paths: ["ansible/**"]
  pull_request:
    branches: ["main"]
    paths: ["ansible/**"]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run ansible-lint
        uses: ansible/ansible-lint@v24
        with:
          working_directory: ansible/
