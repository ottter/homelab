name: Ansible Lint

on:
  push:
    branches: ["main"]
    paths: ["ansible/**"]
  pull_request:
    branches: ["main"]
    paths: ["ansible/**"]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ansible-lint
        run: pip install ansible-lint

      - name: Run ansible-lint
        run: ansible-lint -v ansible/
