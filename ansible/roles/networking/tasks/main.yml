---
- name: Check if Helm is installed
  ansible.builtin.command: helm version --short
  register: networking_helm_check
  changed_when: false
  failed_when: false

# Installs Helm via the official script. The script itself verifies the binary
# with a sha256 checksum before installing.
- name: Download Helm install script
  ansible.builtin.get_url:
    url: https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3
    dest: /tmp/get-helm-3.sh
    mode: "0700"
  when: networking_helm_check.rc != 0

- name: Install Helm
  ansible.builtin.command: /tmp/get-helm-3.sh
  when: networking_helm_check.rc != 0
  changed_when: true

- name: Create metallb-system namespace with PSA exemption
  ansible.builtin.shell:
    cmd: |
      kubectl apply -f - <<'EOF'
      apiVersion: v1
      kind: Namespace
      metadata:
        name: metallb-system
        labels:
          pod-security.kubernetes.io/enforce: privileged
          pod-security.kubernetes.io/audit: privileged
          pod-security.kubernetes.io/warn: privileged
      EOF
    executable: /bin/bash
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: networking_result
  changed_when: "'configured' in networking_result.stdout or 'created' in networking_result.stdout"

- name: Create cert-manager namespace with PSA exemption
  ansible.builtin.shell:
    cmd: |
      kubectl apply -f - <<'EOF'
      apiVersion: v1
      kind: Namespace
      metadata:
        name: cert-manager
        labels:
          pod-security.kubernetes.io/enforce: privileged
          pod-security.kubernetes.io/audit: privileged
          pod-security.kubernetes.io/warn: privileged
      EOF
    executable: /bin/bash
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: networking_result
  changed_when: "'configured' in networking_result.stdout or 'created' in networking_result.stdout"

- name: Create traefik namespace with PSA exemption
  ansible.builtin.shell:
    cmd: |
      kubectl apply -f - <<'EOF'
      apiVersion: v1
      kind: Namespace
      metadata:
        name: traefik
        labels:
          pod-security.kubernetes.io/enforce: baseline
          pod-security.kubernetes.io/audit: baseline
          pod-security.kubernetes.io/warn: baseline
      EOF
    executable: /bin/bash
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: networking_result
  changed_when: "'configured' in networking_result.stdout or 'created' in networking_result.stdout"

- name: Add MetalLB Helm repo
  ansible.builtin.command: helm repo add metallb https://metallb.github.io/metallb
  register: networking_result
  changed_when: "'already exists' not in networking_result.stdout"

- name: Add Traefik Helm repo
  ansible.builtin.command: helm repo add traefik https://traefik.github.io/charts
  register: networking_result
  changed_when: "'already exists' not in networking_result.stdout"

- name: Add cert-manager Helm repo
  ansible.builtin.command: helm repo add jetstack https://charts.jetstack.io
  register: networking_result
  changed_when: "'already exists' not in networking_result.stdout"

- name: Update Helm repos
  ansible.builtin.command: helm repo update
  changed_when: true

- name: Install MetalLB via Helm
  ansible.builtin.command: >
    helm upgrade --install metallb metallb/metallb
    --namespace metallb-system
    --create-namespace
    --version {{ networking_metallb_version }}
    --wait --timeout 120s
    --set speaker.frr.enabled=false
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: networking_result
  changed_when: "'has been upgraded' in networking_result.stdout or 'has been deployed' in networking_result.stdout"

- name: Wait for MetalLB controller to be ready
  ansible.builtin.command: >
    kubectl wait pod
    --selector=app.kubernetes.io/component=controller
    --namespace=metallb-system
    --for=condition=ready
    --timeout=120s
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  changed_when: false

- name: Apply MetalLB IPAddressPool and L2Advertisement
  ansible.builtin.shell:
    cmd: |
      kubectl apply -f - <<'EOF'
      apiVersion: metallb.io/v1beta1
      kind: IPAddressPool
      metadata:
        name: homelab-pool
        namespace: metallb-system
      spec:
        addresses:
        - {{ networking_metallb_pool }}
      ---
      apiVersion: metallb.io/v1beta1
      kind: L2Advertisement
      metadata:
        name: homelab-l2
        namespace: metallb-system
      spec:
        ipAddressPools:
        - homelab-pool
      EOF
    executable: /bin/bash
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: networking_result
  changed_when: "'configured' in networking_result.stdout or 'created' in networking_result.stdout"

- name: Install Traefik via Helm
  ansible.builtin.command: >
    helm upgrade --install traefik traefik/traefik
    --namespace traefik
    --create-namespace
    --version {{ networking_traefik_version }}
    --wait --timeout 120s
    --set "globalArguments={--global.sendAnonymousUsage=false}"
    --set service.type=LoadBalancer
    --set "service.annotations.metallb\.universe\.tf/loadBalancerIPs={{ networking_traefik_lb_ip }}"
    --set ports.web.redirections.entryPoint.to=websecure
    --set ports.web.redirections.entryPoint.scheme=https
    --set ports.websecure.tls.enabled=true
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: networking_result
  changed_when: "'has been upgraded' in networking_result.stdout or 'has been deployed' in networking_result.stdout"

- name: Apply Traefik LAN-only Middleware
  ansible.builtin.shell:
    cmd: |
      kubectl apply -f - <<'EOF'
      apiVersion: traefik.io/v1alpha1
      kind: Middleware
      metadata:
        name: local-ipallowlist
        namespace: traefik
      spec:
        ipAllowList:
          sourceRange:
          - "192.168.0.0/16"
          - "10.0.0.0/8"
          - "127.0.0.1/32"
      EOF
    executable: /bin/bash
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: networking_result
  changed_when: "'configured' in networking_result.stdout or 'created' in networking_result.stdout"

- name: Install cert-manager via Helm
  ansible.builtin.command: >
    helm upgrade --install cert-manager jetstack/cert-manager
    --namespace cert-manager
    --create-namespace
    --version {{ networking_certmanager_version }}
    --set crds.enabled=true
    --wait --timeout 120s
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: networking_result
  changed_when: "'has been upgraded' in networking_result.stdout or 'has been deployed' in networking_result.stdout"

- name: Apply homelab CA ClusterIssuer
  ansible.builtin.shell:
    cmd: |
      kubectl apply -f - <<'EOF'
      apiVersion: cert-manager.io/v1
      kind: ClusterIssuer
      metadata:
        name: homelab-ca-issuer
      spec:
        selfSigned: {}
      ---
      apiVersion: cert-manager.io/v1
      kind: Certificate
      metadata:
        name: homelab-ca
        namespace: cert-manager
      spec:
        isCA: true
        commonName: HomeLab CA
        secretName: homelab-ca-secret
        privateKey:
          algorithm: RSA
          size: 2048
        issuerRef:
          name: homelab-ca-issuer
          kind: ClusterIssuer
          group: cert-manager.io
      ---
      apiVersion: cert-manager.io/v1
      kind: ClusterIssuer
      metadata:
        name: homelab-ca
      spec:
        ca:
          secretName: homelab-ca-secret
      EOF
    executable: /bin/bash
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: networking_result
  changed_when: "'configured' in networking_result.stdout or 'created' in networking_result.stdout"

- name: Wait for homelab CA certificate to be ready
  ansible.builtin.command: >
    kubectl wait certificate homelab-ca
    --namespace cert-manager
    --for=condition=Ready
    --timeout=60s
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  changed_when: false

- name: Export homelab CA certificate for browser trust
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      kubectl get secret homelab-ca-secret -n cert-manager -o jsonpath='{.data.tls\.crt}' | base64 -d
    executable: /bin/bash
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: networking_ca_cert
  changed_when: false

- name: Write CA cert to /etc/homelab-ca.crt
  ansible.builtin.copy:
    content: "{{ networking_ca_cert.stdout }}"
    dest: /etc/homelab-ca.crt
    owner: root
    group: root
    mode: "0644"

- name: Copy CA cert to local working directory
  ansible.builtin.fetch:
    src: /etc/homelab-ca.crt
    dest: "{{ playbook_dir }}/../homelab-ca.crt"
    flat: true
