---
# Fallback defaults — set nfs_enabled and paths in group_vars/all.yml.
nfs_enabled: false
nfs_device: "/dev/sdb1"
nfs_mount_point: "/mnt/plex"
nfs_fs_type: "xfs"
nfs_owner_uid: 1000
nfs_directories:
  - downloads/incomplete
  - downloads/complete
  - media/movies
  - media/tv
  - config
  - transmission/config
