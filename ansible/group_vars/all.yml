---
# Network
lan_subnet: "192.168.0.0/24"
server_lan_ip: "192.168.0.210"
networking_metallb_pool: "192.168.0.220-192.168.0.230"  # MetalLB IP pool; first IP is used by Traefik
networking_traefik_lb_ip: "192.168.0.220"  # Must be first IP of metallb_pool; must match traefik_lb_ip in terraform/homelab.tfvars
plex_lb_ip: "192.168.0.221"  # Must be within metallb_pool; must match plex_lb_ip in terraform/homelab.tfvars
domain_suffix: "local"  # Must match domain_root in terraform/homelab.tfvars

# System
hostname: "minipc"
timezone: "America/New_York"

# SSH hardening
hardening_ssh_port: 22
hardening_ssh_allowed_users: ["{{ ansible_user }}"]
hardening_ssh_password_auth: "no"
hardening_ssh_permit_root_login: "no"
hardening_ssh_max_auth_tries: 3
hardening_ssh_client_alive_interval: 300
hardening_ssh_client_alive_count_max: 2

# fail2ban
hardening_fail2ban_maxretry: 5
hardening_fail2ban_bantime: 3600
hardening_fail2ban_findtime: 600

# k3s
k3s_version: "v1.35.3+k3s1"
k3s_force_reinstall: false

# Networking (MetalLB + Traefik + cert-manager)
networking_metallb_version: "0.14.9"
networking_traefik_version: "35.2.0"
networking_certmanager_version: "v1.17.2"
# networking_letsencrypt_email: ""            # Required for Let's Encrypt ClusterIssuer
# networking_letsencrypt_cloudflare_token: "" # Cloudflare API token: Zone:DNS:Edit on website.dev

# NFS (disabled until external drive is attached — set nfs_enabled: true to activate)
nfs_enabled: false
nfs_device: "/dev/sdb1"
nfs_mount_point: "/mnt/plex"
nfs_owner_uid: 1000
