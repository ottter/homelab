---
# Idempotent — safe to re-run at any time.
# Provisions the full minipc: OS hardening, k3s cluster, and optional NFS storage.
#
# Usage:
#   set -a && . .env && set +a
#   ansible-playbook playbook_bootstrap.yml
#
# After first run, test with:
#   KUBECONFIG=ansible/kubeconfig kubectl get nodes

- name: Provision minipc
  hosts: minipc
  become: true

  roles:
    - common
    - hardening
    - k3s
    - networking
    - nfs
    - dnsmasq
